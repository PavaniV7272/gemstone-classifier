<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemstone Classifier</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --accent: #c9a96e;
      --accent2: #7b6cd0;
      --text: #e8e4f0;
      --muted: #6b6880;
      --gem: #a8d8ea;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    header {
      text-align: center;
      animation: fadeDown 0.8s ease both;
    }

    .gem-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(168,216,234,0.4));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(168,216,234,0.4)); }
      50% { filter: drop-shadow(0 0 35px rgba(168,216,234,0.8)); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.1;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      background: var(--surface);
      animation: fadeUp 0.8s 0.2s ease both;
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,169,110,0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone:hover::before { opacity: 1; }
    .upload-zone.dragover { border-color: var(--accent); background: rgba(201,169,110,0.05); }

    .upload-icon { font-size: 36px; margin-bottom: 12px; display: block; }

    .upload-label {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .upload-label strong {
      color: var(--accent);
      font-weight: 400;
    }

    #fileInput { display: none; }

    /* Preview */
    #preview {
      display: none;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }

    #preview img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      background: var(--surface);
      display: block;
    }

    /* Status */
    .status {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      min-height: 20px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .status.loading { color: var(--accent2); }
    .status.ready { color: #6fcf97; }
    .status.error { color: #eb5757; }

    /* Results */
    #results {
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.5s ease both;
    }

    .result-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .top-result {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .top-result .gem-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .top-result .confidence {
      font-size: 1.4rem;
      color: var(--text);
      font-weight: 300;
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bar-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--gem));
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }

    /* Reset button */
    #resetBtn {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
      align-self: center;
    }

    #resetBtn:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-align: center;
      opacity: 0.5;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <span class="gem-icon">💎</span>
    <h1>Gemstone <span>Classifier</span></h1>
    <p class="subtitle">CV Model · MobileNetV2 · 87 Classes</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">⬆</span>
    <p class="upload-label"><strong>Click to upload</strong> or drag & drop a gemstone image</p>
    <input type="file" id="fileInput" accept="image/*"/>
  </div>

  <div id="preview">
    <img id="previewImg" src="" alt="Preview"/>
  </div>

  <p class="status" id="status">— loading model —</p>

  <div id="results">
    <p class="result-label">Top Prediction</p>
    <div class="top-result">
      <span class="gem-name" id="topName">—</span>
      <span class="confidence" id="topConf">—</span>
    </div>
    <p class="result-label" style="margin-top:8px">Top 5 Matches</p>
    <div class="bar-list" id="barList"></div>
  </div>

  <button id="resetBtn" onclick="reset()">↺ Classify Another</button>

  <footer>All processing happens locally in your browser · No data uploaded</footer>
</div>

<script>
  const CLASS_NAMES = ['Alexandrite','Almandine','Amazonite','Amber','Amethyst','Ametrine','Andalusite','Andradite','Aquamarine','Aventurine Green','Aventurine Yellow','Benitoite','Beryl Golden','Bixbite','Bloodstone','Blue Lace Agate','Carnelian','Cats Eye','Chalcedony','Chalcedony Blue','Chrome Diopside','Chrysoberyl','Chrysocolla','Chrysoprase','Citrine','Coral','Danburite','Diamond','Diaspore','Dumortierite','Emerald','Fluorite','Garnet Red','Goshenite','Grossular','Hessonite','Hiddenite','Iolite','Jade','Jasper','Kunzite','Kyanite','Labradorite','Lapis Lazuli','Larimar','Malachite','Moonstone','Morganite','Onyx Black','Onyx Green','Onyx Red','Opal','Pearl','Peridot','Prehnite','Pyrite','Pyrope','Quartz Beer','Quartz Lemon','Quartz Rose','Quartz Rutilated','Quartz Smoky','Rhodochrosite','Rhodolite','Rhodonite','Ruby','Sapphire Blue','Sapphire Pink','Sapphire Purple','Sapphire Yellow','Scapolite','Serpentine','Sodalite','Spessartite','Sphene','Spinel','Spodumene','Sunstone','Tanzanite','Tigers Eye','Topaz','Tourmaline','Tsavorite','Turquoise','Variscite','Zircon','Zoisite'];

  let model = null;

  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const resetBtn = document.getElementById('resetBtn');

  async function loadModel() {
    try {
      model = await tf.loadGraphModel('model.json');
      setStatus('ready', '— model ready · upload a gemstone image —');
    } catch (e) {
      setStatus('error', '— model failed to load · check files are in same folder —');
    }
  }

  function setStatus(cls, msg) {
    status.className = 'status ' + cls;
    status.textContent = msg;
  }

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    e.dataTransfer.files[0] && handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src = ev.target.result;
      preview.style.display = 'block';
      previewImg.onload = () => classify(previewImg);
    };
    reader.readAsDataURL(file);
  }

  async function classify(imgEl) {
    if (!model) return setStatus('error', '— model not loaded yet —');
    setStatus('loading', '— analyzing gemstone —');
    results.style.display = 'none';
    resetBtn.style.display = 'none';

    const tensor = tf.browser.fromPixels(imgEl)
      .resizeBilinear([224, 224])
      .toFloat()
      .div(255.0)
      .expandDims(0);

    const preds = await model.predict(tensor).data();
    tensor.dispose();

    const indexed = Array.from(preds).map((p, i) => ({ name: CLASS_NAMES[i], prob: p }));
    indexed.sort((a, b) => b.prob - a.prob);
    const top5 = indexed.slice(0, 5);

    document.getElementById('topName').textContent = top5[0].name;
    document.getElementById('topConf').textContent = (top5[0].prob * 100).toFixed(1) + '%';

    const barList = document.getElementById('barList');
    barList.innerHTML = '';
    top5.forEach(item => {
      const pct = (item.prob * 100).toFixed(1);
      barList.innerHTML += `
        <div class="bar-item">
          <div class="bar-header"><span>${item.name}</span><span>${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    });

    results.style.display = 'flex';
    resetBtn.style.display = 'block';
    setStatus('ready', '— classification complete —');
  }

  function reset() {
    preview.style.display = 'none';
    results.style.display = 'none';
    resetBtn.style.display = 'none';
    fileInput.value = '';
    setStatus('ready', '— model ready · upload a gemstone image —');
  }

  loadModel();
</script>
</body>
</html>
